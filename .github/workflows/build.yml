name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild \
            -workspace alt-tab-macos.xcworkspace \
            -scheme Release \
            -derivedDataPath DerivedData \
            MACOSX_DEPLOYMENT_TARGET=10.13 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Ad-hoc sign
        run: codesign -s - --force --deep DerivedData/Build/Products/Release/AltTab.app

      - name: Package
        run: ditto -c -k --keepParent DerivedData/Build/Products/Release/AltTab.app AltTab.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          files: AltTab.zip
